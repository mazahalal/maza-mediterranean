name: Generate data/menu.ts

on:
  push:
    branches: [main]
    paths:
      - 'menu.json'
      - 'references/linked-files/generate-menu-ts.mjs'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate data/menu.ts from menu.json
        run: node references/linked-files/generate-menu-ts.mjs

      - name: Validate sync
        run: node references/linked-files/validate-menu-sync.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/menu.ts; then
            git add data/menu.ts
            git commit -m "chore: regenerate data/menu.ts from menu.json [skip ci]"
            git push
          else
            echo "data/menu.ts already in sync — nothing to commit"
          fi
