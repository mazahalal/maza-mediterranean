name: Menu Sync Check

on:
  pull_request:
    paths:
      - 'menu.json'
      - 'data/menu.ts'
      - 'references/linked-files/validate-menu-sync.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node references/linked-files/validate-menu-sync.mjs
